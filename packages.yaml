# Package definitions for macOS and Linux (Homebrew primary, apt fallback).
# brew: false  → skip brew, use apt/script
# apt: false   → skip apt, use brew/script
# Both fields  → install via both (e.g. build-essential needs apt even with brew)

common:
  - zsh
  - name: python
    brew: python
    apt: false
  - wget
  - name: fd
    brew: fd
    apt: false
  - fzf
  - zoxide
  - ripgrep
  - name: bat
    brew: bat
    apt: false
  - tmux
  - jq
  - yq
  - unzip
  - name: fnm
    brew: fnm
    apt: false
  - pipx
  - gnupg
  - name: build-essential
    brew: gcc
    apt: build-essential
  - curl
  - git
  - git-lfs
  - shellcheck
  - name: uv
    brew: uv
    apt: false

full:
  - gh
  - sqlite3
  - nmap
  - direnv
  - pre-commit
  - name: go
    brew: go
    apt: false
  - gitleaks
  - convco
  - marksman
  - harper
  - glow
  - name: helix
    brew: helix
    apt: false
  - name: ty
    brew: ty
    apt: false
  - name: ruff
    brew: ruff
    apt: false
  - circleci
  - name: libpq
    brew: libpq
    apt: false
  - name: kubernetes-cli
    brew: kubernetes-cli
    apt: false
  - kubectx
  - name: teleport
    brew: false
    apt: false
    script: command -v tsh >/dev/null || curl https://cdn.teleport.dev/install.sh | bash -s "18.7.3" "enterprise"
  - name: tilt
    brew: tilt-dev/tap/tilt
    apt: false
  - name: terraform
    brew: hashicorp/tap/terraform
    apt: false
  - name: graphite
    brew: withgraphite/tap/graphite
    apt: false
  - name: docker
    brew: false
    apt: false
    script: command -v docker >/dev/null || (curl -fsSL https://get.docker.com -o /tmp/get-docker.sh && sudo sh /tmp/get-docker.sh && rm /tmp/get-docker.sh && sudo usermod -aG docker "$USER" && newgrp docker)

macos_only:
  - pinentry-mac

macos_taps:
  - 1password/tap
  - hashicorp/tap
  - tilt-dev/tap
  - withgraphite/tap

linux_taps:
  - hashicorp/tap
  - tilt-dev/tap
  - withgraphite/tap

macos_casks:
  - 1password-cli
  - cursor
  - ghostty
  - gcloud-cli
  - codex
  - docker-desktop
