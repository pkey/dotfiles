# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Session save/restore
set -g @resurrect-auto-restore 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'  # minutes
set -g @resurrect-processes '"~claude->claude --continue" hx ssh'

set -g mouse on
set -g focus-events on

# Open new panes/windows in the current pane's working directory
bind c new-window      -c "#{pane_current_path}"
bind '"' split-window  -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Cmd+N (prefix + digit, via Ghostty) jumps to pane N
bind 1 select-pane -t 1
bind 2 select-pane -t 2
bind 3 select-pane -t 3
bind 4 select-pane -t 4
bind 5 select-pane -t 5
bind 6 select-pane -t 6
bind 7 select-pane -t 7
bind 8 select-pane -t 8
bind 9 select-pane -t 9

# Alt+N (no prefix) jumps to window N
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Use Ctrl-A as primary prefix; keep Ctrl-B as secondary so Ghostty
# shortcuts (which send \x02) continue to work.
# Ctrl-A Ctrl-A / Ctrl-A a sends literal Ctrl-A to preserve readline's
# "beginning of line" in the shell.
unbind C-b
set -g prefix C-a
set -g prefix2 C-b
bind C-a send-prefix
bind a send-prefix

# 1-indexed windows and panes (so Cmd+1 = first window)
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Visual feedback when prefix (Ctrl-B) is pressed
set -g status-right "#{?client_prefix,#[fg=black#,bg=yellow#,bold] PREFIX #[default] ,}#{=21:pane_title} %H:%M %d-%b-%y"

# Highlight active pane with a brighter, bold border
set -g pane-border-style 'fg=colour238'
set -g pane-active-border-style 'fg=colour208,bold'

# Show pane index above each pane
set -g pane-border-status top
set -g pane-border-format " #{pane_index} "

# Kill pane — y confirms, any other key cancels
bind-key x confirm-before -p "Kill pane? (y/n)" kill-pane

# New session (prefix + N prompts for a name)
bind-key N command-prompt -p "New session name:" "new-session -s '%%'"

# Initialize TPM (keep this at the very bottom)
run '~/.tmux/plugins/tpm/tpm'

# Auto-install any missing plugins on tmux start
run '~/.tmux/plugins/tpm/bin/install_plugins'
