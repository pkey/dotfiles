# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'

set -g @resurrect-auto-restore 'on'

set -g mouse on

# 1-indexed windows and panes (so Cmd+1 = first window)
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Visual feedback when prefix (Ctrl-B) is pressed
set -g status-right "#{?client_prefix,#[fg=black#,bg=yellow#,bold] PREFIX #[default] ,}#{=21:pane_title} %H:%M %d-%b-%y"

# Kill pane — press Enter to confirm, Esc to cancel
bind-key x command-prompt -p "Kill pane? (Enter/Esc)" "kill-pane"

# Initialize TPM (keep this at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
